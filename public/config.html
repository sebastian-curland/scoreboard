<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <a href="index.html">&#8592; Back</a>
    <h1>&#9881; Settings</h1>
  </header>

  <div class="config-main">
    <p class="config-description">Toggle leagues on or off. Changes save automatically.</p>

    <div class="general-settings">
      <label class="general-setting-row">
        <span class="general-setting-label">Recent games: past</span>
        <input type="number" id="recent-days-input" min="1" max="14" value="2" class="recent-days-input">
        <span class="general-setting-label">days</span>
      </label>
    </div>

    <div id="config-grid" class="config-grid">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script src="app.js"></script>
</body>
</html>
