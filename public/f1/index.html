<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 2026 Results</title>
  <link rel="stylesheet" href="f1_style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="f1-logo">F1</span>
      <h1>2026 Season</h1>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="race">Race Results</button>
    <button class="tab" data-tab="qualifying">Qualifying</button>
    <div class="tabs-divider"></div>
    <button class="tab" data-tab="drivers">Drivers</button>
    <button class="tab" data-tab="constructors">Constructors</button>
  </nav>

  <div id="schedule-loading" class="schedule-loading">
    <div class="spinner"></div>
    <span>Loading schedule…</span>
  </div>

  <div id="gp-row-wrap" class="gp-row-wrap hidden">
    <div id="gp-row" class="gp-row"></div>
  </div>

  <main id="main" class="hidden">
    <div class="results-header">
      <div class="results-title-row">
        <h2 id="results-title"></h2>
        <div id="live-badge" class="live-badge hidden">
          <span class="live-dot"></span>LIVE
        </div>
      </div>
      <p id="results-subtitle" class="results-subtitle"></p>
    </div>
    <div id="results-content"></div>
  </main>

  <div id="select-prompt" class="select-prompt hidden">
    Select a Grand Prix above to view results
  </div>

  <main id="standings-main" class="hidden">
    <div id="standings-content"></div>
  </main>

  <script src="f1_app.js"></script>
</body>
</html>
